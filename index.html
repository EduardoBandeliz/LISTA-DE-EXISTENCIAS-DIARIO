<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celucenter · Lista de existencias</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#0078C8;
    --blue-deep:#004E85;
    --green:#7DC242;
    --green-deep:#5A9128;
    --orange:#F7941D;
    --orange-deep:#D6790A;
    --ink:#0B1220;
    --paper:#F4F7FA;
    --card:#FFFFFF;
    --line:#E3E9F0;
    --muted:#5C6B7A;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Archivo',sans-serif;
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;}
  a{color:inherit;}

  /* ---------- HERO ---------- */
  .hero{
    position:relative;
    overflow:hidden;
    background:
      radial-gradient(1200px 500px at 12% -10%, rgba(125,194,66,.35), transparent 60%),
      radial-gradient(900px 500px at 100% 0%, rgba(247,148,29,.35), transparent 55%),
      linear-gradient(135deg, var(--blue-deep) 0%, var(--blue) 60%, #005f9e 100%);
    color:#fff;
    padding:56px 24px 68px;
  }
  .hero::after{
    content:"";
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
    background-size:42px 42px;
    mask-image:linear-gradient(to bottom, black, transparent 85%);
    pointer-events:none;
  }
  .hero-inner{max-width:1180px;margin:0 auto;position:relative;z-index:1;}
  .brand-row{display:flex;align-items:center;gap:10px;margin-bottom:22px;}
  .brand-dot{width:12px;height:12px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px rgba(125,194,66,.25);}
  .brand-name{font-family:'Space Grotesk',sans-serif;font-weight:700;letter-spacing:.5px;font-size:15px;text-transform:uppercase;opacity:.9;}
  .hero h1{font-size:clamp(28px,4.4vw,44px);font-weight:700;line-height:1.08;margin:0 0 10px;max-width:720px;}
  /* ---------- CONTROLS ---------- */
  .controls-wrap{max-width:1180px;margin:-34px auto 0;padding:0 24px;position:relative;z-index:2;}
  .controls{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:0 10px 30px rgba(11,18,32,.08);
    padding:18px 20px;
  }
  .search-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
  .search-box{
    flex:1 1 260px;
    position:relative;
  }
  .search-box input{
    width:100%;
    padding:12px 14px 12px 40px;
    border:1px solid var(--line);
    border-radius:10px;
    font-size:14px;
    font-family:'Archivo',sans-serif;
    background:var(--paper);
    color:var(--ink);
  }
  .search-box input:focus{outline:2px solid var(--blue);outline-offset:1px;}
  .search-box svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.45;}
  select#sort{
    padding:12px 14px;
    border:1px solid var(--line);
    border-radius:10px;
    font-size:14px;
    font-family:'Archivo',sans-serif;
    background:var(--paper);
    color:var(--ink);
  }
  .chip-group{display:flex;flex-wrap:wrap;gap:8px;}
  .chip-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:14px 0 8px;}
  .chip{
    padding:7px 14px;
    border-radius:999px;
    font-size:13px;
    font-weight:600;
    background:var(--paper);
    border:1px solid var(--line);
    cursor:pointer;
    color:var(--muted);
    white-space:nowrap;
    transition:all .15s ease;
  }
  .chip:hover{border-color:var(--blue);color:var(--blue);}
  .chip.active{background:var(--blue);border-color:var(--blue);color:#fff;}
  .chip.active.green{background:var(--green);border-color:var(--green);}

  /* ---------- RESULTS ---------- */
  .results-bar{
    max-width:1180px;margin:22px auto 4px;padding:0 24px;
    display:flex;align-items:center;justify-content:space-between;
    font-size:13px;color:var(--muted);
  }
  #stats-count b{color:var(--ink);}

  .grid{
    max-width:1180px;margin:0 auto;padding:14px 24px 70px;
    display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
    display:flex;flex-direction:column;gap:8px;
    animation:fadeUp .35s ease both;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .card:hover{transform:translateY(-3px);box-shadow:0 12px 24px rgba(11,18,32,.08);}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .card-brand{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--blue);}
  .card-name{font-size:14px;font-weight:600;line-height:1.35;color:var(--ink);min-height:38px;}
  .card-price{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:var(--green-deep);margin-top:2px;}
  .card-cta{
    margin-top:8px;
    display:flex;align-items:center;justify-content:center;gap:8px;
    padding:10px;border-radius:10px;
    background:var(--green);color:#fff;font-weight:700;font-size:13px;
    text-decoration:none;
    transition:background .15s ease;
  }
  .card-cta:hover{background:var(--green-deep);}

  .empty{max-width:1180px;margin:60px auto;text-align:center;color:var(--muted);font-size:15px;padding:0 24px;}

  .footer-cta{
    max-width:1180px;margin:0 auto 60px;padding:0 24px;
  }
  .footer-cta-inner{
    background:linear-gradient(135deg, var(--green) 0%, var(--green-deep) 100%);
    border-radius:var(--radius);
    padding:28px 26px;color:#fff;
    display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:16px;
  }
  .footer-cta h3{margin:0 0 4px;font-size:20px;}
  .footer-cta p{margin:0;font-size:13px;color:rgba(255,255,255,.85);}
  .btn-wsp{
    display:inline-flex;align-items:center;gap:8px;
    background:#fff;color:var(--green-deep);
    padding:12px 20px;border-radius:10px;font-weight:700;font-size:14px;
    text-decoration:none;white-space:nowrap;
  }

  @media (max-width:640px){
    .hero{padding:40px 18px 60px;}
    .controls-wrap{padding:0 14px;}
    .grid{padding:14px 14px 60px;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
    .footer-cta{padding:0 14px;}
    .footer-cta-inner{flex-direction:column;align-items:flex-start;}
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <div class="brand-row">
      <div class="brand-dot"></div>
      <div class="brand-name">Celucenter</div>
    </div>
    <h1>LISTA DE EXISTENCIAS</h1>
  </div>
</div>

<div class="controls-wrap">
  <div class="controls">
    <div class="search-row">
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="search" type="text" placeholder="Buscar por nombre, modelo, color, memoria...">
      </div>
      <select id="sort">
        <option value="name-asc">Nombre A-Z</option>
        <option value="name-desc">Nombre Z-A</option>
        <option value="price-asc">Precio: menor a mayor</option>
        <option value="price-desc">Precio: mayor a menor</option>
      </select>
    </div>
    <div class="chip-label">Marca / grupo</div>
    <div class="chip-group" id="brand-chips"></div>
  </div>
</div>

<div class="results-bar">
  <div id="stats-count"></div>
</div>

<div id="grid-wrap"></div>

<div class="footer-cta">
  <div class="footer-cta-inner">
    <div>
      <h3>¿No encuentras lo que buscas?</h3>
      <p>Escríbenos directo y te ayudamos con tu pedido o cotización especial.</p>
    </div>
    <a class="btn-wsp" target="_blank" href="https://wa.me/523332559420?text=Hola%2C%20vi%20la%20lista%20de%20precios%20del%2010%20de%20julio%20y%20quiero%20cotizar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.29-1.39a9.87 9.87 0 0 0 4.75 1.21h.01c5.46 0 9.9-4.45 9.9-9.91C21.96 6.45 17.5 2 12.04 2Zm5.8 14.05c-.24.68-1.4 1.32-1.93 1.4-.5.08-1.12.11-1.8-.11-.42-.13-.95-.31-1.64-.6-2.88-1.25-4.75-4.15-4.9-4.34-.14-.2-1.17-1.56-1.17-2.98 0-1.42.75-2.11 1.02-2.4.27-.29.58-.36.78-.36h.55c.18 0 .41-.07.64.48.24.58.8 2 .87 2.14.07.14.11.31.02.5-.09.19-.14.31-.27.47-.14.16-.29.36-.41.48-.14.14-.28.29-.12.57.16.27.7 1.16 1.51 1.88 1.04.93 1.92 1.22 2.19 1.36.27.14.43.11.59-.07.16-.18.68-.79.86-1.06.18-.27.36-.22.6-.13.25.09 1.6.75 1.87.89.27.14.45.2.51.32.07.11.07.66-.17 1.34Z"/></svg>
      Escríbenos por WhatsApp
    </a>
  </div>
</div>

<script>
const WSP_NUMBER = '523332559420';
let PRODUCTS = [];

let activeBrand = 'Todos';

const urlParams = new URLSearchParams(window.location.search);
const IS_DSE = urlParams.has('DSE') || urlParams.has('dse');
const PRICE_DISCOUNT = IS_DSE ? 30 : Math.max(0, Number(urlParams.get('descuento') || 0));

function fmtPrice(p){
  return '$' + Number(p).toLocaleString('es-MX', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function displayPrice(product){
  return Math.max(0, Number(product.precio || 0) - PRICE_DISCOUNT);
}

function inferBrand(name, fallback){
  const accessoryGroups = ['ACCESORIOS BODEGA','ACCESORIOS','ADAPTADORES','BUYTITI','CABLES','DEMOS','MISCELANEOS','MOREKA','PROMOCIONALES','SENWA','STEREN','UNONU','ONONU','ZTE'];
  const fallbackUpper = String(fallback || '').toUpperCase();
  const nameUpper = String(name || '').toUpperCase();
  if(accessoryGroups.some(group => fallbackUpper.includes(group) || nameUpper.includes(group))){
    return 'Accesorios';
  }
  const brands = ['Apple','Samsung','Motorola','Xiaomi','BLU','Infinix','Tecno','Realme','Honor','Itel','Cubot','Google','Naomi','Qtouch','Blackview'];
  const upperName = name.toUpperCase();
  return brands.find(brand => upperName.includes(brand.toUpperCase())) || fallback || 'Otros';
}

function normalizeProduct(item, index){
  return {
    id: item.id || index + 1,
    codigo: item.codigo || '',
    nombre: item.nombre,
    cantidad: item.cantidad || '',
    existencia_minima: item.existencia_minima || 0,
    disponible: item.disponible !== false,
    precio: item.precio_lista_m ?? item.precio ?? 0,
    precio_publico: item.precio_publico ?? null,
    marca: item.marca || inferBrand(item.nombre || '', item.categoria_pdf),
    categoria: item.categoria || inferBrand(item.nombre || '', item.categoria_pdf)
  };
}

async function loadProducts(){
  const response = await fetch('inventario.json?v=' + Date.now());
  if(!response.ok) throw new Error('No se pudo cargar inventario.json');
  const data = await response.json();
  PRODUCTS = (data.productos || data).map(normalizeProduct);
}

function updateBrandChips(){
  const brands = ['Todos', ...Array.from(new Set(PRODUCTS.map(p=>p.marca))).sort()];
  const brandWrap = document.getElementById('brand-chips');
  if(!brands.includes(activeBrand)) activeBrand='Todos';
  brandWrap.innerHTML = brands.map(b =>
    `<div class="chip green ${b===activeBrand?'active':''}" data-brand="${b}">${b}</div>`
  ).join('');
  brandWrap.querySelectorAll('.chip').forEach(el=>{
    el.addEventListener('click', ()=>{ activeBrand = el.dataset.brand; render(); });
  });
}

function getFiltered(){
  const q = document.getElementById('search').value.toLowerCase().trim();
  let list = PRODUCTS.filter(p =>
    (activeBrand==='Todos' || p.marca===activeBrand) &&
    (!q || p.nombre.toLowerCase().includes(q))
  );
  const sort = document.getElementById('sort').value;
  list = list.slice();
  if(sort==='name-asc') list.sort((a,b)=>a.nombre.localeCompare(b.nombre));
  if(sort==='name-desc') list.sort((a,b)=>b.nombre.localeCompare(a.nombre));
  if(sort==='price-asc') list.sort((a,b)=>displayPrice(a)-displayPrice(b));
  if(sort==='price-desc') list.sort((a,b)=>displayPrice(b)-displayPrice(a));
  return list;
}

function render(){
  updateBrandChips();
  const list = getFiltered();
  document.getElementById('stats-count').innerHTML = `<b>${list.length}</b> producto${list.length!==1?'s':''} encontrado${list.length!==1?'s':''}`;
  const wrap = document.getElementById('grid-wrap');
  if(!list.length){
    wrap.innerHTML = `<div class="empty">🔍 No encontramos productos con esos filtros. Intenta con otro término o quita algún filtro.</div>`;
    return;
  }
  wrap.innerHTML = `<div class="grid">${
    list.map((p, idx) => {
      const price = displayPrice(p);
      const msg = encodeURIComponent(`Hola! Me interesa el producto: *${p.nombre}* - ${fmtPrice(price)}. ¿Me das más info?`);
      return `
      <div class="card" style="animation-delay:${Math.min(idx*0.02,0.3)}s">
        <div class="card-brand">${p.marca}</div>
        <div class="card-name">${p.nombre}</div>
        <div class="card-price">${fmtPrice(price)}</div>
        <a class="card-cta" target="_blank" href="https://wa.me/${WSP_NUMBER}?text=${msg}">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.29-1.39a9.87 9.87 0 0 0 4.75 1.21h.01c5.46 0 9.9-4.45 9.9-9.91C21.96 6.45 17.5 2 12.04 2Zm5.8 14.05c-.24.68-1.4 1.32-1.93 1.4-.5.08-1.12.11-1.8-.11-.42-.13-.95-.31-1.64-.6-2.88-1.25-4.75-4.15-4.9-4.34-.14-.2-1.17-1.56-1.17-2.98 0-1.42.75-2.11 1.02-2.4.27-.29.58-.36.78-.36h.55c.18 0 .41-.07.64.48.24.58.8 2 .87 2.14.07.14.11.31.02.5-.09.19-.14.31-.27.47-.14.16-.29.36-.41.48-.14.14-.28.29-.12.57.16.27.7 1.16 1.51 1.88 1.04.93 1.92 1.22 2.19 1.36.27.14.43.11.59-.07.16-.18.68-.79.86-1.06.18-.27.36-.22.6-.13.25.09 1.6.75 1.87.89.27.14.45.2.51.32.07.11.07.66-.17 1.34Z"/></svg>
          Cotizar
        </a>
      </div>`;
    }).join('')
  }</div>`;
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('sort').addEventListener('change', render);

async function init(){
  try{
    await loadProducts();
    updateBrandChips();
    render();
  }catch(error){
    document.getElementById('grid-wrap').innerHTML = `<div class="empty">No se pudo cargar el inventario. Revisa inventario.json.</div>`;
    console.error(error);
  }
}

init();
</script>
</body>
</html>
